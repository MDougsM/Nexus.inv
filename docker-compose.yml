version: '3.8'

services:
  backend:
    build: ./backend
    container_name: nexus_backend
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  frontend:
    image: node:20-alpine
    container_name: nexus_frontend
    working_dir: /app
    environment:
      - PROXY_TARGET=http://backend:8001 # ⚡ NOVO: Avisa o Vite qual é o endereço no Docker
    ports:
      - "5174:5174"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
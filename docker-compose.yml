version: '3.8'

services:
  backend:
    build: ./backend
    container_name: nexus_backend
    restart: always
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - VERSAO_ATUAL=${VERSAO_ATUAL}
    command: uvicorn app.main:app --host 0.0.0.0 --port ${BACKEND_PORT} --reload

  frontend:
    image: node:20-alpine
    container_name: nexus_frontend
    working_dir: /app
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    # O comando sh garante que o npm install rode antes de subir o servidor
    command: sh -c "npm install && npm run dev -- --host"